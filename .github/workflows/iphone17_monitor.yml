name: Apple整備済品 iPhone 17 監視

# 自動監視は停止中。手動実行（workflow_dispatch）のみ可能。
# 再開する場合は schedule の cron をコメント解除してください。
on:
  # schedule:
  #   - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore status cache
        uses: actions/cache@v4
        with:
          path: iphone17_last_status.json
          key: iphone17-refurbished-status
          restore-keys: iphone17-refurbished-status

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('camp_requirements.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r camp_requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run iPhone 17 monitor script
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python iphone17_monitor.py
