name: キャンプ場 キャンセル空き監視

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-camp-cancellation-${{ hashFiles('camp_cancellation_requirements.txt') }}
          restore-keys: pip-camp-cancellation-

      - name: Install dependencies
        run: pip install -r camp_cancellation_requirements.txt

      - name: Run cancellation monitor
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CAMP_CHECKIN: ${{ secrets.CAMP_CHECKIN }}
          CAMP_CHECKOUT: ${{ secrets.CAMP_CHECKOUT }}
        run: python camp_cancellation_monitor.py

      - name: Commit and push status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add camp_cancellation_status.json
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "🏕️ キャンセル監視ステータス更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git push
