name: 個人情報収集システム

on:
  schedule:
    - cron: "0 22 * * *"   # 7:00 JST
    - cron: "0 3 * * *"    # 12:00 JST
    - cron: "0 9 * * *"    # 18:00 JST
    - cron: "0 13 * * *"   # 22:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-news-${{ hashFiles('news_requirements.txt') }}
          restore-keys: pip-news-

      - name: Install dependencies
        run: pip install -r news_requirements.txt

      - name: Run news collector
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python news_collector.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "📰 記事更新 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')"
          git push
