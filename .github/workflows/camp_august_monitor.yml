name: お盆キャンプ場 空き監視

# 監視対象がないため自動実行は停止中。手動実行（workflow_dispatch）のみ可能。
# 再開する場合は schedule と workflow_run のコメントを解除すること。
on:
  # schedule:
  #   # 毎時0/30分の混雑を避けて分をオフセット
  #   # 注: このリポジトリはschedule発火が大幅に間引かれるため、
  #   #     確実に動いているニュース収集の完了にも連動させる（下のworkflow_run）
  #   - cron: "9,29,49 * * * *"
  # workflow_run:
  #   workflows: ["個人情報収集システム"]
  #   types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore status cache
        uses: actions/cache/restore@v4
        with:
          path: camp_august_status.json
          key: camp-august-status-${{ github.run_id }}
          restore-keys: camp-august-status-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-camp-august-${{ hashFiles('camp_august_requirements.txt') }}
          restore-keys: pip-camp-august-

      - name: Install dependencies
        run: pip install -r camp_august_requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('camp_august_requirements.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run monitor
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        # Cloudflare対策: xvfb上でヘッド付きブラウザを起動する
        run: xvfb-run --auto-servernum python camp_august_monitor.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: camp-august-debug-${{ github.run_id }}
          path: camp_debug_morappu_*
          if-no-files-found: ignore
          retention-days: 3

      - name: Save status cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: camp_august_status.json
          key: camp-august-status-${{ github.run_id }}
