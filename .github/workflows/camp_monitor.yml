name: タキノキャンプ場 キャンセル監視

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      test_email:
        description: "テストメールを送信する（空き状況のチェックはスキップ）"
        type: boolean
        default: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore status cache
        uses: actions/cache@v4
        with:
          path: camp_last_status.json
          key: camp-takino-status
          restore-keys: camp-takino-status

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('camp_requirements.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r camp_requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run camp monitor script
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TEST_EMAIL: ${{ inputs.test_email }}
        run: python camp_monitor.py
