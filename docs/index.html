<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイニュース</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #e8eaf6;
      --text-muted: #8b92b8;
      --accent: #5c6bc0;
      --accent-light: #7986cb;
      --new-badge: #1b5e20;
      --new-text: #a5d6a7;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 900px;
      margin: 0 auto;
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .meta { font-size: 12px; color: var(--text-muted); text-align: right; }

    /* ── Controls ── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      position: sticky;
      top: 57px;
      z-index: 9;
    }
    .controls-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 8px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--accent-light); }
    #search::placeholder { color: var(--text-muted); }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tab {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 5px 13px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab:hover { border-color: var(--accent-light); color: var(--text); }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .tab .count {
      opacity: 0.75;
      font-size: 11px;
      margin-left: 3px;
    }

    /* ── Article Grid ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }
    #stats {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 14px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    @media (max-width: 600px) {
      #grid { grid-template-columns: 1fr; }
    }

    /* ── Article Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      text-decoration: none;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card:hover {
      border-color: var(--accent-light);
      transform: translateY(-2px);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .cat-badge {
      background: var(--surface2);
      border-radius: 6px;
      font-size: 12px;
      padding: 3px 7px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .new-badge {
      background: var(--new-badge);
      border-radius: 6px;
      color: var(--new-text);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 7px;
      flex-shrink: 0;
    }
    .card-title {
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.45;
    }
    .card-summary {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }
    .card-source {
      color: var(--accent-light);
      font-size: 12px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-date {
      color: var(--text-muted);
      font-size: 11px;
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Empty / Loading ── */
    .empty {
      color: var(--text-muted);
      grid-column: 1/-1;
      padding: 40px 0;
      text-align: center;
    }
    .spinner {
      animation: spin 0.8s linear infinite;
      border: 3px solid var(--border);
      border-top-color: var(--accent-light);
      border-radius: 50%;
      height: 36px;
      margin: 40px auto;
      width: 36px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>📰 マイニュース</h1>
    <div class="meta" id="meta">読み込み中...</div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <input type="search" id="search" placeholder="🔍 記事を検索...">
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<main>
  <div id="stats"></div>
  <div id="grid"><div class="spinner"></div></div>
</main>

<script>
  const DATA_URL = "./data/articles.json";
  const NEW_HOURS = 24;

  let allArticles = [];
  let activeCategory = "all";
  let searchQuery = "";

  function formatDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    const now = new Date();
    const diffH = (now - d) / 3600000;
    if (diffH < 1) return "1時間以内";
    if (diffH < 24) return `${Math.floor(diffH)}時間前`;
    const diffD = Math.floor(diffH / 24);
    if (diffD < 7) return `${diffD}日前`;
    return d.toLocaleDateString("ja-JP", { month: "short", day: "numeric" });
  }

  function isNew(article) {
    if (!article.first_seen) return false;
    return (new Date() - new Date(article.first_seen)) / 3600000 < NEW_HOURS;
  }

  function buildTabs(articles) {
    const counts = { all: articles.length };
    const labels = {};
    for (const a of articles) {
      counts[a.category] = (counts[a.category] || 0) + 1;
      labels[a.category] = a.category_label;
    }
    const tabsEl = document.getElementById("tabs");
    tabsEl.innerHTML = "";

    const makeTab = (key, label) => {
      const btn = document.createElement("button");
      btn.className = "tab" + (key === activeCategory ? " active" : "");
      btn.dataset.cat = key;
      btn.innerHTML = `${label}<span class="count">${counts[key] || 0}</span>`;
      btn.addEventListener("click", () => {
        activeCategory = key;
        document.querySelectorAll(".tab").forEach(t =>
          t.classList.toggle("active", t.dataset.cat === key)
        );
        render();
      });
      tabsEl.appendChild(btn);
    };

    makeTab("all", "すべて");
    for (const [cat, label] of Object.entries(labels)) {
      if (counts[cat]) makeTab(cat, label);
    }
  }

  function render() {
    const q = searchQuery.toLowerCase();
    const filtered = allArticles.filter(a => {
      if (activeCategory !== "all" && a.category !== activeCategory) return false;
      if (q) {
        const hay = `${a.title} ${a.source} ${a.summary} ${a.category_label}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    const statsEl = document.getElementById("stats");
    statsEl.textContent = `${filtered.length} 件表示`;

    const grid = document.getElementById("grid");
    if (!filtered.length) {
      grid.innerHTML = '<div class="empty">記事が見つかりません</div>';
      return;
    }

    grid.innerHTML = filtered.map(a => `
      <a class="card" href="${a.url}" target="_blank" rel="noopener">
        <div class="card-top">
          <span class="cat-badge">${a.category_label}</span>
          ${isNew(a) ? '<span class="new-badge">NEW</span>' : ""}
        </div>
        <div class="card-title">${a.title}</div>
        ${a.summary ? `<div class="card-summary">${a.summary}</div>` : ""}
        <div class="card-footer">
          <span class="card-source">${a.source}</span>
          <span class="card-date">${formatDate(a.published)}</span>
        </div>
      </a>
    `).join("");
  }

  async function load() {
    try {
      const res = await fetch(DATA_URL + "?t=" + Date.now());
      const data = await res.json();
      allArticles = data.articles || [];

      const metaEl = document.getElementById("meta");
      if (data.last_updated) {
        const d = new Date(data.last_updated);
        metaEl.innerHTML =
          `更新: ${d.toLocaleString("ja-JP", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}<br>` +
          `今回 +${data.last_run_new_count || 0}件 / 計${data.total_articles || 0}件`;
      } else {
        metaEl.textContent = "まだデータがありません";
      }

      buildTabs(allArticles);
      render();
    } catch (e) {
      document.getElementById("grid").innerHTML =
        '<div class="empty">データの読み込みに失敗しました<br><small>' + e.message + '</small></div>';
    }
  }

  document.getElementById("search").addEventListener("input", e => {
    searchQuery = e.target.value;
    render();
  });

  load();
</script>
</body>
</html>
